name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - name: gofmt
        run: |
          fmtout=$(gofmt -l .)
          if [ -n "$fmtout" ]; then
            echo "gofmt issues:"
            echo "$fmtout"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test -race -count=1 -timeout 120s ./...
      - name: build
        run: go build -trimpath -o /tmp/mkdev ./cmd/mkdev

  lint:
    name: lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m
